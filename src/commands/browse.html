<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>whyline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px; height: 100vh; display: flex; flex-direction: column;
    }
    /* Top bar */
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; background: #0f172a; border-bottom: 1px solid #1e293b;
      flex-shrink: 0;
    }
    .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.5px; }
    #repo-name { color: #64748b; margin-left: 6px; }
    #stats { color: #64748b; font-size: 11px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    #search {
      background: #1e293b; border: 1px solid #334155; border-radius: 5px;
      padding: 5px 10px; color: #e2e8f0; font-size: 12px; width: 240px; outline: none;
    }
    #search:focus { border-color: #3b82f6; }
    /* Split */
    #split { display: flex; flex: 1; min-height: 0; }
    /* Commit list */
    #commit-list { width: 38%; border-right: 1px solid #1e293b; overflow-y: auto; }
    .commit-row {
      padding: 10px 12px; border-bottom: 1px solid #1e293b; cursor: pointer;
      border-left: 3px solid transparent;
    }
    .commit-row:hover { background: #111827; }
    .commit-row.selected { background: #1e3a5f; border-left-color: #3b82f6; }
    .commit-row.no-memory { opacity: 0.5; }
    .commit-header { display: flex; justify-content: space-between; align-items: center; }
    .commit-sha { font-family: monospace; color: #94a3b8; font-size: 11px; }
    .badge { border-radius: 3px; padding: 1px 6px; font-size: 10px; font-weight: 600; }
    .badge-why { background: #1d4ed8; color: #fff; }
    .badge-stale { background: #92400e; color: #fbbf24; }
    .commit-message {
      margin-top: 3px; font-size: 12px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .commit-meta { color: #64748b; font-size: 11px; margin-top: 1px; }
    /* Detail */
    #detail-panel { width: 62%; padding: 20px 24px; overflow-y: auto; }
    .empty-state {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #475569; font-size: 14px;
    }
    .detail-meta { font-family: monospace; color: #64748b; font-size: 11px; margin-bottom: 6px; }
    .detail-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .tag { background: #1e293b; border-radius: 4px; padding: 2px 8px; font-size: 11px; color: #94a3b8; }
    .field { margin-bottom: 14px; }
    .field-label {
      color: #64748b; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 4px;
    }
    .field-value { font-size: 13px; line-height: 1.6; }
    .field-list { margin: 0; padding-left: 18px; }
    .field-list li { font-size: 12px; color: #94a3b8; line-height: 1.7; }
    .files { font-family: monospace; font-size: 11px; color: #94a3b8; line-height: 1.8; }
    #no-results { padding: 20px; color: #475569; text-align: center; }
    /* Status bar */
    #statusbar {
      padding: 5px 16px; background: #0f172a; border-top: 1px solid #1e293b;
      font-size: 11px; color: #475569; display: flex; justify-content: space-between;
      flex-shrink: 0;
    }
    kbd { background: #1e293b; padding: 1px 5px; border-radius: 3px; font-family: monospace; }
  </style>
</head>
<body>
  <div id="topbar">
    <div>
      <span class="logo">whyline</span>
      <span id="repo-name"></span>
    </div>
    <div class="topbar-right">
      <input id="search" type="text" placeholder="🔍 search memories…" autocomplete="off" />
      <span id="stats"></span>
    </div>
  </div>
  <div id="split">
    <div id="commit-list"></div>
    <div id="detail-panel">
      <div class="empty-state">Select a commit to see its memory.</div>
    </div>
  </div>
  <div id="statusbar">
    <span>Press <kbd>↑</kbd> <kbd>↓</kbd> to navigate commits</span>
    <span>Ctrl-C in terminal to stop server</span>
  </div>

  <script>
    let allCommits = [];
    let filteredCommits = [];
    let selectedIndex = -1;

    function esc(s) {
      if (!s) return '';
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function relDate(iso) {
      const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
      if (days === 0) return 'today';
      if (days === 1) return '1d ago';
      if (days < 30) return days + 'd ago';
      return Math.floor(days / 30) + 'mo ago';
    }

    function renderList() {
      const el = document.getElementById('commit-list');
      if (filteredCommits.length === 0) {
        el.innerHTML = '<div id="no-results">No commits match your search.</div>';
        return;
      }
      el.innerHTML = filteredCommits.map((c, i) => `
        <div class="commit-row${!c.hasMemory ? ' no-memory' : ''}${i === selectedIndex ? ' selected' : ''}"
             onclick="selectCommit(${i})">
          <div class="commit-header">
            <span class="commit-sha">${c.sha.slice(0, 8)}</span>
            ${c.isStale
              ? '<span class="badge badge-stale">STALE</span>'
              : c.hasMemory
                ? '<span class="badge badge-why">WHY</span>'
                : ''}
          </div>
          <div class="commit-message">${esc(c.message)}</div>
          <div class="commit-meta">${relDate(c.date)}${c.branch ? ' · ' + esc(c.branch) : ''}</div>
        </div>
      `).join('');
    }

    async function selectCommit(index) {
      selectedIndex = index;
      renderList();
      const c = filteredCommits[index];
      if (!c) return;
      const panel = document.getElementById('detail-panel');
      if (!c.hasMemory) {
        panel.innerHTML = '<div class="empty-state">No memory recorded for this commit.</div>';
        return;
      }
      panel.innerHTML = '<div class="empty-state">Loading…</div>';
      try {
        const res = await fetch('/api/memory/' + c.sha);
        if (!res.ok) {
          panel.innerHTML = '<div class="empty-state">No memory recorded for this commit.</div>';
          return;
        }
        renderDetail(c, await res.json());
      } catch {
        panel.innerHTML = '<div class="empty-state">Failed to load memory.</div>';
      }
    }

    function field(label, value) {
      if (!value) return '';
      return `<div class="field"><div class="field-label">${label}</div><div class="field-value">${esc(value)}</div></div>`;
    }

    function fieldList(label, items) {
      if (!items || items.length === 0) return '';
      return `<div class="field"><div class="field-label">${label}</div><ul class="field-list">${items.map(i => `<li>${esc(i)}</li>`).join('')}</ul></div>`;
    }

    function renderDetail(c, m) {
      document.getElementById('detail-panel').innerHTML = `
        <div class="detail-meta">${c.sha.slice(0, 8)} · ${relDate(c.date)}${c.branch ? ' · ' + esc(c.branch) : ''}</div>
        <div class="detail-title">${esc(c.message)}</div>
        ${m.tags && m.tags.length ? `<div class="tags">${m.tags.map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        ${field('Intent', m.intent)}
        ${field('Decision', m.decision)}
        ${field('Why', m.why)}
        ${fieldList('Alternatives rejected', m.alternativesRejected)}
        ${fieldList('Risks', m.risks)}
        ${fieldList('Follow-ups', m.followUps)}
        ${m.files && m.files.length ? `<div class="field"><div class="field-label">Files touched</div><div class="files">${m.files.map(f => esc(f)).join(' · ')}</div></div>` : ''}
      `;
    }

    function doSearch(q) {
      const lq = q.toLowerCase();
      filteredCommits = lq
        ? allCommits.filter(c =>
            c.message.toLowerCase().includes(lq) ||
            (c.intent && c.intent.toLowerCase().includes(lq)) ||
            (c.decision && c.decision.toLowerCase().includes(lq)) ||
            (c.why && c.why.toLowerCase().includes(lq))
          )
        : allCommits;
      selectedIndex = -1;
      renderList();
      document.getElementById('detail-panel').innerHTML =
        '<div class="empty-state">Select a commit to see its memory.</div>';
    }

    document.getElementById('search').addEventListener('input', e => doSearch(e.target.value));

    document.addEventListener('keydown', e => {
      if (e.target === document.getElementById('search')) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (selectedIndex < filteredCommits.length - 1) selectCommit(selectedIndex + 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (selectedIndex > 0) selectCommit(selectedIndex - 1);
      }
    });

    async function init() {
      try {
        const res = await fetch('/api/commits');
        const { repoName, commits } = await res.json();
        allCommits = commits;
        filteredCommits = commits;
        document.getElementById('repo-name').textContent = '/ ' + repoName;
        const memCount = commits.filter(c => c.hasMemory).length;
        document.getElementById('stats').textContent =
          `${memCount} memor${memCount === 1 ? 'y' : 'ies'} · ${commits.length} commits`;
        renderList();
        const first = filteredCommits.findIndex(c => c.hasMemory);
        if (first >= 0) selectCommit(first);
      } catch {
        document.getElementById('commit-list').innerHTML =
          '<div id="no-results">Failed to load commits.</div>';
      }
    }

    init();
  </script>
</body>
</html>
